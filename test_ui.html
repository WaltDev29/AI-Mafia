<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 마피아 - 테스트 클라이언트</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #0a0b0f;
      --bg-card: #13151c;
      --bg-card2: #1a1d28;
      --bg-input: #1f2233;
      --border: #2a2e42;
      --border-bright: #3d4260;
      --accent: #7c6ef5;
      --accent-glow: rgba(124, 110, 245, 0.25);
      --accent-hover: #9488f8;
      --danger: #f56565;
      --danger-glow: rgba(245, 101, 101, 0.2);
      --success: #48bb78;
      --success-glow: rgba(72, 187, 120, 0.2);
      --warning: #ed8936;
      --warning-glow: rgba(237, 137, 54, 0.2);
      --info: #63b3ed;
      --text-primary: #e2e8f0;
      --text-secondary: #8892b0;
      --text-muted: #4a5568;
      --ai-color: #9f7aea;
      --human-color: #63b3ed;
      --judge-color: #ed8936;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 헤더 ────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      font-size: 1.4rem;
    }

    .logo-tag {
      font-size: 0.65rem;
      font-weight: 500;
      background: var(--accent);
      color: #fff;
      padding: 2px 7px;
      border-radius: 99px;
      letter-spacing: 0.5px;
    }

    .conn-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      max-width: 700px;
    }

    .conn-row input,
    .conn-row select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      padding: 8px 12px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .conn-row input:focus,
    .conn-row select:focus {
      border-color: var(--accent);
    }

    #inp-url {
      flex: 2;
    }

    #inp-mode {
      flex: 1;
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger-glow);
    }

    .btn-send {
      background: var(--accent);
      color: #fff;
      padding: 10px 22px;
      font-size: 0.9rem;
    }

    .btn-send:hover {
      background: var(--accent-hover);
    }

    .btn-send:disabled {
      background: var(--bg-input);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-exp {
      background: var(--success);
      color: #0a0b0f;
      padding: 10px 22px;
      font-size: 0.9rem;
    }

    .btn-exp:hover {
      filter: brightness(1.1);
    }

    .btn-exp:disabled {
      background: var(--bg-input);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }

    .status-dot.connected {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .status-dot.waiting {
      background: var(--warning);
      box-shadow: 0 0 8px var(--warning);
      animation: pulse 1.5s infinite;
    }

    .status-dot.error {
      background: var(--danger);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* ── 메인 레이아웃 ───────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 사이드바 ────────────────────────────── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* 게임 상태 */
    .phase-display {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .phase-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .phase-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .round-info {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    .prompt-word {
      margin-top: 6px;
      padding: 8px 10px;
      background: var(--bg-input);
      border-radius: 7px;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--warning);
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* 타이머 */
    .timer-bar-wrap {
      margin-top: 10px;
    }

    .timer-text {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .timer-bar {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .timer-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 1s linear, background 0.3s;
    }

    /* 플레이어 목록 */
    .player-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .player-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 0.83rem;
      transition: opacity 0.3s;
    }

    .player-item.eliminated {
      opacity: 0.35;
      text-decoration: line-through;
    }

    .player-item.current-turn {
      border-color: var(--warning);
      background: rgba(237, 137, 54, 0.08);
    }

    .player-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .player-avatar.human {
      background: rgba(99, 179, 237, 0.2);
      color: var(--human-color);
      border: 1px solid var(--human-color);
    }

    .player-avatar.ai {
      background: rgba(159, 122, 234, 0.2);
      color: var(--ai-color);
      border: 1px solid var(--ai-color);
    }

    .player-name {
      font-weight: 500;
      flex: 1;
    }

    .player-tag {
      font-size: 0.62rem;
      padding: 2px 6px;
      border-radius: 99px;
      font-weight: 600;
    }

    .player-tag.you {
      background: rgba(99, 179, 237, 0.2);
      color: var(--human-color);
    }

    .player-tag.ai {
      background: rgba(159, 122, 234, 0.2);
      color: var(--ai-color);
    }

    .player-tag.elim {
      background: rgba(245, 101, 101, 0.2);
      color: var(--danger);
    }

    /* 이벤트 로그 */
    .event-log {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .event-log::-webkit-scrollbar {
      width: 4px;
    }

    .event-log::-webkit-scrollbar-track {
      background: transparent;
    }

    .event-log::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 99px;
    }

    .event-item {
      font-size: 0.74rem;
      color: var(--text-muted);
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.4;
    }

    .event-item:last-child {
      border-bottom: none;
    }

    .event-time {
      color: var(--text-muted);
    }

    .event-text {
      color: var(--text-secondary);
    }

    /* ── 채팅 영역 ───────────────────────────── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-secondary);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-mode-badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .messages::-webkit-scrollbar {
      width: 5px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 99px;
    }

    /* 시스템 메시지 */
    .msg-system {
      display: flex;
      justify-content: center;
    }

    .msg-system-inner {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 16px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      max-width: 80%;
      text-align: center;
    }

    /* 채팅 메시지 */
    .msg-chat {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .msg-chat.mine {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .msg-avatar.human {
      background: rgba(99, 179, 237, 0.2);
      color: var(--human-color);
    }

    .msg-avatar.ai {
      background: rgba(159, 122, 234, 0.2);
      color: var(--ai-color);
    }

    .msg-body {
      max-width: 65%;
    }

    .msg-name {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .mine .msg-name {
      text-align: right;
    }

    .msg-bubble {
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-bubble.human-bubble {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .msg-bubble.mine-bubble {
      background: var(--accent);
      color: #fff;
      border-radius: 12px 12px 4px 12px;
    }

    .msg-bubble.ai-bubble {
      background: rgba(159, 122, 234, 0.12);
      border: 1px solid rgba(159, 122, 234, 0.3);
      color: var(--text-primary);
    }

    /* 경험담 메시지 */
    .msg-experience {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--warning);
      border-radius: 0 10px 10px 0;
      padding: 10px 14px;
    }

    .msg-exp-header {
      font-size: 0.72rem;
      color: var(--warning);
      font-weight: 600;
      margin-bottom: 5px;
    }

    .msg-exp-content {
      font-size: 0.88rem;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* 판정 결과 */
    .msg-judge {
      background: linear-gradient(135deg, rgba(245, 101, 101, 0.08), rgba(124, 110, 245, 0.08));
      border: 1px solid var(--danger);
      border-radius: 12px;
      padding: 16px;
    }

    .judge-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 10px;
      color: var(--danger);
    }

    .judge-target {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .judge-prob {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .judge-prob-label {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    .judge-prob-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .judge-prob-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--danger));
      border-radius: 99px;
      transition: width 0.8s ease;
    }

    .judge-prob-val {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--danger);
    }

    .judge-reason {
      font-size: 0.83rem;
      color: var(--text-secondary);
      line-height: 1.6;
      padding: 8px 10px;
      background: var(--bg-card);
      border-radius: 7px;
    }

    /* 게임 오버 */
    .msg-gameover {
      text-align: center;
      padding: 24px;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    .msg-gameover.human-win {
      background: linear-gradient(135deg, rgba(72, 187, 120, 0.1), rgba(99, 179, 237, 0.1));
      border-color: var(--success);
    }

    .msg-gameover.ai-win {
      background: linear-gradient(135deg, rgba(245, 101, 101, 0.1), rgba(159, 122, 234, 0.1));
      border-color: var(--danger);
    }

    .gameover-emoji {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .gameover-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .gameover-desc {
      font-size: 0.88rem;
      color: var(--text-secondary);
    }

    /* ── 입력 영역 ───────────────────────────── */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      background: var(--bg-card);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .phase-hint {
      font-size: 0.76rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .phase-hint-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #chat-input,
    #exp-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      resize: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    #chat-input:focus,
    #exp-input:focus {
      border-color: var(--accent);
    }

    #chat-input:disabled,
    #exp-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #exp-input {
      min-height: 70px;
    }

    .special-panel {
      display: none;
      background: var(--bg-card2);
      border: 1px solid var(--warning);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 5px;
    }

    /* 대기 패널 */
    .waiting-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 0;
    }

    .waiting-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .waiting-text {
      font-size: 0.88rem;
      color: var(--text-secondary);
    }

    /* 애니메이션 */
    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 반응형 */
    @media (max-width: 900px) {
      .sidebar {
        width: 200px;
      }
    }

    @media (max-width: 650px) {
      .sidebar {
        display: none;
      }

      .conn-row #inp-url {
        display: none;
      }
    }

    /* 대기방 모달 */
    .waiting-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(10, 11, 15, 0.85);
      backdrop-filter: blur(5px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: var(--text-primary);
    }

    .waiting-modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .waiting-spinner-large {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px auto;
    }

    /* 타이핑 인디케이터 */
    .typing-indicator {
      font-size: 0.8rem;
      color: var(--text-secondary);
      padding: 4px 10px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .typing-dots {
      display: flex;
      gap: 3px;
    }

    .typing-dot {
      width: 4px;
      height: 4px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out both;
    }

    .typing-dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .typing-dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes typingBounce {

      0%,
      80%,
      100% {
        transform: scale(0);
      }

      40% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <!-- ── 헤더 ──────────────────────────────────── -->
  <header>
    <div class="logo">
      <span class="logo-icon">🕵️</span>
      <span>AI 마피아</span>
      <span class="logo-tag">DEV</span>
    </div>

    <div class="conn-row">
      <input id="inp-url" type="text" value="ws://localhost:8000/ws" placeholder="WebSocket URL" />
      <select id="inp-mode">
        <option value="solo">솔로 (인간1 vs AI4)</option>
        <option value="group">단체 (인간4 vs AI1)</option>
      </select>
      <button id="btn-connect" class="btn btn-primary" onclick="handleConnect()">연결</button>
      <button id="btn-disconnect" class="btn btn-danger" onclick="handleDisconnect()" style="display:none">연결
        해제</button>
    </div>

    <div class="status-badge">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">미연결</span>
    </div>
  </header>

  <!-- ── 메인 레이아웃 ─────────────────────────── -->
  <div class="main">

    <!-- 사이드바 -->
    <aside class="sidebar">

      <!-- 게임 상태 -->
      <div class="sidebar-section">
        <div class="sidebar-title">게임 상태</div>
        <div class="phase-display">
          <div class="phase-label">현재 단계</div>
          <div class="phase-value" id="phase-text">—</div>
          <div class="round-info" id="round-info" style="display:none">라운드 <span id="round-num">0</span></div>
          <div class="prompt-word" id="prompt-word" style="display:none"></div>
          <div class="timer-bar-wrap" id="timer-wrap" style="display:none">
            <div class="timer-text">
              <span id="timer-label">자유 대화 타이머</span>
              <span id="timer-val">—</span>
            </div>
            <div class="timer-bar">
              <div class="timer-fill" id="timer-fill" style="width:100%"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 플레이어 목록 -->
      <div class="sidebar-section" style="flex:1;overflow-y:auto">
        <div class="sidebar-title">플레이어</div>
        <div class="player-list" id="player-list">
          <div style="font-size:0.8rem;color:var(--text-muted)">게임 시작 후 표시됩니다</div>
        </div>
      </div>

      <!-- 이벤트 로그 -->
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;border-top:1px solid var(--border)">
        <div class="sidebar-section" style="border-bottom:none;padding-bottom:8px">
          <div class="sidebar-title">이벤트 로그</div>
        </div>
        <div class="event-log" id="event-log"></div>
      </div>

    </aside>

    <!-- 채팅 영역 -->
    <div class="chat-area">
      <div class="chat-header">
        <span id="chat-header-text">게임 메시지가 여기에 표시됩니다</span>
        <span class="chat-mode-badge" id="chat-mode-badge">—</span>
      </div>

      <div class="messages" id="messages">
        <div class="msg-system fade-in">
          <div class="msg-system-inner">🕵️ 서버에 연결하여 게임을 시작하세요</div>
        </div>
      </div>

      <!-- 입력 영역 -->
      <div class="input-area">

        <!-- 타이핑 인디케이터 -->
        <div id="typing-indicator" class="typing-indicator" style="display:none">
          <div class="typing-dots">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
          <span id="typing-text">입력 중...</span>
        </div>

        <!-- 경험담 특별 패널 (차례일 때만 표시) -->
        <div id="panel-experience" class="special-panel">
          <div class="phase-hint" style="margin-bottom:8px">
            <div class="phase-hint-dot" style="background:var(--warning)"></div>
            <span id="exp-hint-text" style="color:var(--warning);font-weight:600">경험담을 2줄 이내로 작성해주세요.</span>
          </div>
          <div class="input-row">
            <textarea id="exp-input" rows="2" placeholder="제시어에 대한 나의 경험을 2줄 이내로..."></textarea>
            <button class="btn btn-exp" id="btn-send-exp" onclick="sendExperience()">제출</button>
          </div>
        </div>

        <!-- 기본 상태 텍스트 (채팅 위) -->
        <div id="status-hint" class="phase-hint">
          <div class="phase-hint-dot" id="status-hint-dot" style="background:var(--text-muted)"></div>
          <span id="status-hint-text">서버에 연결하면 게임이 시작됩니다.</span>
        </div>

        <!-- 상시 채팅 입력창 -->
        <div class="input-row">
          <textarea id="chat-input" rows="1" placeholder="자유 대화 시간에만 채팅을 입력할 수 있습니다." disabled></textarea>
          <button class="btn btn-send" id="btn-send-chat" onclick="sendChat()" disabled>전송</button>
        </div>
      </div>
    </div>

  </div>

  <!-- 대기방 모달 -->
  <div id="waiting-modal" class="waiting-modal" style="display:none">
    <div class="waiting-modal-content">
      <div class="waiting-spinner-large"></div>
      <h2 style="margin-bottom: 10px;">단체 게임 대기 중</h2>
      <div id="waiting-modal-text" style="color: var(--text-secondary);">인원을 모집하고 있습니다...</div>
    </div>
  </div>

  <script>
    // ────────────────────────────────────────────────────
    // 상태
    // ────────────────────────────────────────────────────
    let ws = null;
    let myPlayerId = null;
    const playerNames = {};
    let players = [];
    let currentPhase = null;
    let timerInterval = null;
    let timerTotal = 0;
    let timerRemaining = 0;
    let typingPlayers = new Set();
    let typingTimeout = null;

    const PHASE_LABELS = {
      waiting: '대기 중',
      round_start: '라운드 시작',
      experience_sharing: '경험 공유',
      free_chat: '자유 대화',
      judging: 'AI 판정 중',
      game_over: '게임 종료',
    };

    // ────────────────────────────────────────────────────
    // 연결 관리
    // ────────────────────────────────────────────────────
    function handleConnect() {
      const url = document.getElementById('inp-url').value.trim();
      const nickname = document.getElementById('inp-nickname').value.trim();
      const mode = document.getElementById('inp-mode').value;

      if (!nickname) { alert('닉네임을 입력해주세요.'); return; }
      if (!url) { alert('서버 URL을 입력해주세요.'); return; }

      myNickname = nickname;
      const fullUrl = `${url}?mode=${mode}&nickname=${encodeURIComponent(nickname)}`;

      try {
        ws = new WebSocket(fullUrl);
      } catch (e) {
        setStatus('error', '연결 실패');
        return;
      }

      setStatus('waiting', '연결 중...');

      ws.onopen = () => {
        setStatus('connected', '연결됨');
        document.getElementById('btn-connect').style.display = 'none';
        document.getElementById('btn-disconnect').style.display = '';
        document.getElementById('chat-mode-badge').textContent = mode === 'solo' ? '솔로 모드' : '단체 모드';
        logEvent('서버 연결 성공');

        if (mode === 'group') {
          setChatState(false, '단체 대기방에 입장했습니다...', '대기 중');
        } else {
          setChatState(false, '라운드 시작을 기다리는 중...', '대기 중');
        }
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          handleMessage(msg);
        } catch (e) {
          console.error('메시지 파싱 오류:', e);
        }
      };

      ws.onclose = () => {
        setStatus('error', '연결 끊김');
        document.getElementById('btn-connect').style.display = '';
        document.getElementById('btn-disconnect').style.display = 'none';
        setChatState(false, '서버 연결이 끊겼습니다.', '연결 끊김');
        logEvent('연결 끊김');
        stopTimer();
      };

      ws.onerror = (e) => {
        setStatus('error', '오류 발생');
        logEvent('WebSocket 오류 발생');
      };
    }

    function handleDisconnect() {
      if (ws) { ws.close(); ws = null; }
      resetState();
      setStatus('', '미연결');
      setChatState(false, '서버에 연결하면 게임이 시작됩니다.', '미연결');
      document.getElementById('btn-connect').style.display = '';
      document.getElementById('btn-disconnect').style.display = 'none';
    }

    // ────────────────────────────────────────────────────
    // 메시지 처리
    // ────────────────────────────────────────────────────
    function handleMessage(msg) {
      const { type, data } = msg;
      logEvent(type, data);

      switch (type) {

        case 'game_start':
          document.getElementById('waiting-modal').style.display = 'none';
          handleGameStart(data);
          break;

        case 'waiting_room':
          document.getElementById('waiting-modal').style.display = 'flex';
          document.getElementById('waiting-modal-text').textContent = data.message || '대기 중...';
          break;

        case 'round_start':
          handleRoundStart(data);
          break;

        case 'experience_request':
          handleExperienceRequest(data);
          break;

        case 'experience_submitted':
          handleExperienceSubmitted(data);
          break;

        case 'experience_timeout':
          appendSystemMsg(`⏰ ${playerNames[data.player_id]}님이 시간 초과로 패스했습니다.`);
          break;

        case 'free_chat_start':
          handleFreeChatStart(data);
          break;

        case 'free_chat_end':
          handleFreeChatEnd();
          break;

        case 'chat_message':
          handleChatMessage(data);
          break;

        case 'typing_status':
          handleTypingStatus(data);
          break;

        case 'judging_start':
          currentPhase = 'judging';
          setPhase('AI 판정 중...');
          setChatState(false, '🤔 LLM 판정관이 대화를 분석 중입니다...', '판정 중');
          appendSystemMsg('🧠 LLM 판정관이 대화를 분석하고 있습니다...');
          stopTimer();
          break;

        case 'judge_result':
          handleJudgeResult(data);
          break;

        case 'player_eliminated':
          appendSystemMsg(`🚫 ${playerNames[data.player_id]}님이 연결 끊김으로 탈락했습니다.`);
          markEliminated(data.player_id);
          break;

        case 'game_over':
          handleGameOver(data);
          break;

        case 'error':
          appendSystemMsg(`❌ 오류: ${data.detail}`);
          break;
      }
    }

    function handleGameStart(data) {
      players = data.players;
      // 내 id 찾기 (닉네임 기준)
      const me = players.find(p => p.nickname === myNickname && p.is_human);
      if (me) myPlayerId = me.id;

      renderPlayers();
      setPhase('게임 시작');
      document.getElementById('chat-header-text').textContent = '게임이 시작되었습니다!';
      appendSystemMsg(`🎮 게임 시작! 참가자: ${players.map(p => playerNames[p.id]).join(', ')}`);
      setChatState(false, '라운드 시작을 기다리는 중...', '대기 중');
    }

    function handleRoundStart(data) {
      currentPhase = 'round_start';
      document.getElementById('round-info').style.display = '';
      document.getElementById('round-num').textContent = data.round;
      document.getElementById('prompt-word').style.display = '';
      document.getElementById('prompt-word').textContent = `📌 ${data.prompt_word}`;
      setPhase(`라운드 ${data.round} 시작`);

      const orderText = data.order.map((p, i) => `${i + 1}. ${playerNames[p.id]}`).join(' → ');
      appendSystemMsg(`🎯 라운드 ${data.round} 시작! 제시어: "${data.prompt_word}"`);
      appendSystemMsg(`📋 발언 순서: ${orderText}`);
      setChatState(false, '경험 공유 순서를 기다리는 중...', '경험 공유 중');
    }

    function handleExperienceRequest(data) {
      currentPhase = 'experience_sharing';
      setPhase('경험 공유');
      const isMyTurn = data.current_player_id === myPlayerId;
      appendSystemMsg(`🎤 ${playerNames[data.current_player_id]}님의 경험 공유 차례 (${data.timeout}초)`);

      document.querySelectorAll('.player-item').forEach(el => el.classList.remove('current-turn'));
      const playerEl = document.querySelector(`[data-pid="${data.current_player_id}"]`);
      if (playerEl) playerEl.classList.add('current-turn');

      if (isMyTurn) {
        const prompt = document.getElementById('prompt-word').textContent.replace('📌 ', '');
        document.getElementById('exp-hint-text').textContent =
          `"${prompt}"에 대한 경험을 2줄 이내로 작성하세요. (${data.timeout}초)`;
        document.getElementById('panel-experience').style.display = 'block';
        document.getElementById('exp-input').focus();
        setChatState(false, '당신의 차례입니다. 위의 입력창에 경험담을 작성해주세요.', '내 차례');
      } else {
        document.getElementById('panel-experience').style.display = 'none';
        setChatState(false, `${playerNames[data.current_player_id]}님이 경험담을 작성 중입니다...`, '경험 공유 중');
      }
      startTimer(data.timeout, '경험 공유');
    }

    function handleExperienceSubmitted(data) {
      appendExperienceMsg(playerNames[data.player_id], data.content, data.player_id);
      if (data.player_id === myPlayerId) {
        document.getElementById('panel-experience').style.display = 'none';
        setChatState(false, '다른 플레이어의 경험 공유를 기다리는 중...', '대기 중');
      }
      const playerEl = document.querySelector(`[data-pid="${data.player_id}"]`);
      if (playerEl) playerEl.classList.remove('current-turn');
    }

    function handleFreeChatStart(data) {
      currentPhase = 'free_chat';
      setPhase('자유 대화');
      timerTotal = data.duration;
      timerRemaining = data.duration;
      document.getElementById('panel-experience').style.display = 'none';
      setChatState(true, '자유 대화 중입니다. 자연스럽게 대화에 참여하세요.', '자유 대화');
      appendSystemMsg(`💬 자유 대화 시작! ${data.duration}초 동안 자유롭게 대화하세요.`);
      startTimer(data.duration, '자유 대화');
    }

    function handleFreeChatEnd() {
      currentPhase = 'judging';
      stopTimer();
      setChatState(false, '자유 대화 종료. 판정 대기 중...', '판정 중');
      appendSystemMsg('⏰ 자유 대화 시간이 종료되었습니다.');
    }

    function handleChatMessage(data) {
      const isMe = data.player_id === myPlayerId;
      const player = players.find(p => p.id === data.player_id);
      const isAI = player ? !player.is_human : false;
      appendChatMsg(playerNames[data.player_id], data.content, isMe, isAI, data.player_id);
    }

    function handleTypingStatus(data) {
      if (data.is_typing) {
        typingPlayers.add(playerNames[data.player_id]);
      } else {
        typingPlayers.delete(playerNames[data.player_id]);
      }
      const indicator = document.getElementById('typing-indicator');
      const text = document.getElementById('typing-text');

      const size = typingPlayers.size;
      if (size > 0) {
        indicator.style.display = 'flex';
        const arr = Array.from(typingPlayers);
        if (size === 1) {
          text.textContent = `${arr[0]}님이 입력 중...`;
        } else if (size === 2) {
          text.textContent = `${arr[0]}, ${arr[1]}님이 입력 중...`;
        } else {
          text.textContent = `${arr[0]}님 외 ${size - 1}명이 입력 중...`;
        }
      } else {
        indicator.style.display = 'none';
      }
    }

    function handleJudgeResult(data) {
      setPhase('판정 완료');
      appendJudgeResult(data);
      markEliminated(data.eliminated_player_id);
      renderPlayers();
      const txt = data.was_human ? '인간이 탈락했습니다. 다음 라운드를 기다리는 중...' : '🎉 AI가 탈락했습니다!';
      setChatState(false, txt, '대기 중');
    }

    function handleGameOver(data) {
      currentPhase = 'game_over';
      setPhase('게임 종료');
      stopTimer();
      setChatState(false, '게임이 종료되었습니다.', '게임 종료');
      appendGameOver(data);
      renderPlayers();
    }

    // ────────────────────────────────────────────────────
    // 입력 전송
    // ────────────────────────────────────────────────────
    function sendChat() {
      const input = document.getElementById('chat-input');
      const content = input.value.trim();
      if (!content || !ws) return;
      ws.send(JSON.stringify({ type: 'send_chat', data: { content } }));
      input.value = '';
      input.style.height = 'auto';
      sendTypingStatus(false);
    }

    function sendExperience() {
      const input = document.getElementById('exp-input');
      const content = input.value.trim();
      if (!content || !ws) return;
      ws.send(JSON.stringify({ type: 'submit_experience', data: { content } }));
      input.value = '';
      sendTypingStatus(false);
    }

    function sendTypingStatus(isTyping) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'typing_status', data: { is_typing: isTyping } }));
      }
    }

    // 입력 중 상태 전송 바인딩
    document.addEventListener('DOMContentLoaded', () => {
      ['chat-input', 'exp-input'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('input', () => {
          sendTypingStatus(true);
          clearTimeout(typingTimeout);
          typingTimeout = setTimeout(() => sendTypingStatus(false), 2000);
        });
        el.addEventListener('blur', () => {
          clearTimeout(typingTimeout);
          sendTypingStatus(false);
        });
      });
    });

    // Enter 키 처리
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendChat();
        }
      });

    });

    // ────────────────────────────────────────────────────
    // UI 헬퍼
    // ────────────────────────────────────────────────────
    function setStatus(type, text) {
      const dot = document.getElementById('status-dot');
      dot.className = 'status-dot ' + type;
      document.getElementById('status-text').textContent = text;
    }

    function setPhase(label) {
      document.getElementById('phase-text').textContent = label;
    }

    function setChatState(enabled, hintText, phaseHintName = '') {
      const input = document.getElementById('chat-input');
      const btn = document.getElementById('btn-send-chat');
      const hint = document.getElementById('status-hint-text');
      const dot = document.getElementById('status-hint-dot');

      input.disabled = !enabled;
      btn.disabled = !enabled;
      hint.textContent = hintText;

      if (enabled) {
        dot.style.background = 'var(--accent)';
        input.placeholder = '메시지 입력... (Enter로 전송, Shift+Enter 줄바꿈)';
        input.focus();
      } else {
        dot.style.background = 'var(--text-muted)';
        input.placeholder = '자유 대화 시간에만 입력할 수 있습니다.';
        if (phaseHintName) hint.textContent = `[${phaseHintName}] ${hintText}`;
      }
    }

    function resetState() {
      players = [];
      myPlayerId = null;
      currentPhase = null;
      stopTimer();
      renderPlayers();
      setPhase('—');
      document.getElementById('round-info').style.display = 'none';
      document.getElementById('prompt-word').style.display = 'none';
      document.getElementById('timer-wrap').style.display = 'none';
      document.getElementById('messages').innerHTML = '';
      document.getElementById('event-log').innerHTML = '';
      document.getElementById('chat-mode-badge').textContent = '—';
      document.getElementById('panel-experience').style.display = 'none';
    }

    function renderPlayers() {
      const list = document.getElementById('player-list');
      if (!players.length) {
        list.innerHTML = '<div style="font-size:0.8rem;color:var(--text-muted)">게임 시작 후 표시됩니다</div>';
        return;
      }
      list.innerHTML = players.map(p => {
        const isMe = p.id === myPlayerId;
        const avatarClass = p.is_human ? 'human' : 'ai';
        const avatarLetter = playerNames[p.id].charAt(0).toUpperCase();
        let tag = '';
        if (p.is_eliminated) tag = '<span class="player-tag elim">탈락</span>';
        else if (isMe) tag = '<span class="player-tag you">나</span>';
        else if (!p.is_human) tag = '<span class="player-tag ai">AI?</span>';
        return `
        <div class="player-item ${p.is_eliminated ? 'eliminated' : ''}" data-pid="${p.id}">
          <div class="player-avatar ${avatarClass}">${avatarLetter}</div>
          <span class="player-name">${playerNames[p.id]}</span>
          ${tag}
        </div>`;
      }).join('');
    }

    function markEliminated(playerId) {
      const p = players.find(pl => pl.id === playerId);
      if (p) p.is_eliminated = true;
      renderPlayers();
    }

    // ── 메시지 추가 헬퍼 ─────────────────────────
    function scrollToBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    function appendSystemMsg(text) {
      const msgs = document.getElementById('messages');
      msgs.insertAdjacentHTML('beforeend', `
      <div class="msg-system fade-in">
        <div class="msg-system-inner">${text}</div>
      </div>`);
      scrollToBottom();
    }

    function appendChatMsg(playerName, content, isMe, isAI, playerId) {
      const msgs = document.getElementById('messages');
      const avatarClass = isAI ? 'ai' : 'human';
      const bubbleClass = isMe ? 'mine-bubble' : (isAI ? 'ai-bubble' : 'human-bubble');
      const letter = playerName.charAt(0).toUpperCase();
      const timeStr = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

      msgs.insertAdjacentHTML('beforeend', `
      <div class="msg-chat ${isMe ? 'mine' : ''} fade-in">
        <div class="msg-avatar ${avatarClass}">${letter}</div>
        <div class="msg-body">
          <div class="msg-name">${playerName} · ${timeStr}</div>
          <div class="msg-bubble ${bubbleClass}">${escHtml(content)}</div>
        </div>
      </div>`);
      scrollToBottom();
    }

    function appendExperienceMsg(playerName, content, playerId) {
      const msgs = document.getElementById('messages');
      msgs.insertAdjacentHTML('beforeend', `
      <div class="msg-experience fade-in">
        <div class="msg-exp-header">🗣 ${escHtml(playerName)}의 경험담</div>
        <div class="msg-exp-content">${escHtml(content)}</div>
      </div>`);
      scrollToBottom();
    }

    function appendJudgeResult(data) {
      const msgs = document.getElementById('messages');
      const prob = data.human_probability;
      const wasHumanText = data.was_human === true ? ' <span style="color:var(--danger)">(실제 인간)</span>'
        : data.was_human === false ? ' <span style="color:var(--ai-color)">(실제 AI)</span>' : '';

      msgs.insertAdjacentHTML('beforeend', `
      <div class="msg-judge fade-in">
        <div class="judge-header">🔍 LLM 판정 결과</div>
        <div class="judge-target">
          탈락자: <strong>${escHtml(data.eliminated_nickname)}</strong>${wasHumanText}
        </div>
        <div class="judge-prob">
          <span class="judge-prob-label">사람일 확률</span>
          <div class="judge-prob-bar">
            <div class="judge-prob-fill" style="width:${prob}%"></div>
          </div>
          <span class="judge-prob-val">${prob}%</span>
        </div>
        <div class="judge-reason">💬 ${escHtml(data.reason)}</div>
      </div>`);
      scrollToBottom();
    }

    function appendGameOver(data) {
      const msgs = document.getElementById('messages');
      const isHumanWin = data.result === 'human_win';
      const emoji = isHumanWin ? '🎉' : '😈';
      const titleClass = isHumanWin ? 'human-win' : 'ai-win';
      const title = isHumanWin ? '인간 승리!' : 'AI 승리!';

      const playerRows = (data.players || []).map(p =>
        `<span style="color:${p.is_eliminated ? 'var(--text-muted)' : (p.is_human ? 'var(--human-color)' : 'var(--ai-color)')}">
        ${playerNames[p.id]}${p.is_eliminated ? '(탈락)' : ''}${!p.is_human ? ' 🤖' : ''}
      </span>`
      ).join(' / ');

      msgs.insertAdjacentHTML('beforeend', `
      <div class="msg-gameover ${titleClass} fade-in">
        <div class="gameover-emoji">${emoji}</div>
        <div class="gameover-title">${title}</div>
        <div class="gameover-desc">${escHtml(data.message || '')}</div>
        <div style="margin-top:12px;font-size:0.8rem;color:var(--text-muted)">${playerRows}</div>
      </div>`);
      scrollToBottom();
    }

    // ── 타이머 ───────────────────────────────────
    function startTimer(duration, label) {
      const wrap = document.getElementById('timer-wrap');
      const val = document.getElementById('timer-val');
      const fill = document.getElementById('timer-fill');
      const labelEl = document.getElementById('timer-label');

      if (labelEl) labelEl.textContent = label + ' 타이머';
      wrap.style.display = '';
      timerTotal = duration;
      timerRemaining = duration;

      stopTimer();
      timerInterval = setInterval(() => {
        timerRemaining--;
        val.textContent = `${timerRemaining}초`;
        const pct = Math.max(0, (timerRemaining / timerTotal) * 100);
        fill.style.width = pct + '%';
        if (timerRemaining <= 30) {
          fill.style.background = 'var(--danger)';
        } else if (timerRemaining <= 60) {
          fill.style.background = 'var(--warning)';
        }
        if (timerRemaining <= 0) stopTimer();
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      document.getElementById('timer-wrap').style.display = 'none';
    }

    // ── 이벤트 로그 ─────────────────────────────
    function logEvent(type, data) {
      const log = document.getElementById('event-log');
      const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      log.insertAdjacentHTML('beforeend', `
      <div class="event-item">
        <span class="event-time">[${time}]</span>
        <span class="event-text"> ${escHtml(type)}</span>
      </div>`);
      log.scrollTop = log.scrollHeight;
    }

    // XSS 방지
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/\n/g, '<br>');
    }
  </script>
</body>

</html>
